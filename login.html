<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - OMK Wae Mbeleng 1</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
</head>

<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class='bx bxs-church'></i>
                <h2>Admin Panel</h2>
                <p>Silakan masuk menggunakan kredensial Anda.</p>
            </div>

            <form id="loginForm" class="admin-form">
                <div id="loginError" class="login-error" style="display: none;">Email atau Password salah!</div>

                <div class="form-group">
                    <label for="email">Email Admin</label>
                    <div class="input-icon">
                        <i class='bx bx-envelope'></i>
                        <input type="email" id="email" placeholder="admin@omkwambeleng1.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-icon">
                        <i class='bx bx-lock-alt'></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary"
                    style="width: 100%; margin-top: 10px; justify-content: center;">Masuk <i
                        class='bx bx-log-in'></i></button>

                <div style="text-align: center; margin-top: 24px;">
                    <a href="./" class="back-link" style="justify-content: center; font-size: 0.9rem;"><i
                            class='bx bx-arrow-back'></i> Kembali ke Beranda</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Check if already logged in
            const currentUser = localStorage.getItem('omk_admin_current');
            if (currentUser) {
                window.location.href = 'admin.html';
                return;
            }

            // Initialize default admin if not exists in LocalStorage
            if (!localStorage.getItem('omk_admin_users')) {
                const defaultUsers = [
                    { email: 'admin@omkwambeleng1.com', password: 'admin' }
                ];
                localStorage.setItem('omk_admin_users', JSON.stringify(defaultUsers));
            }

            const loginForm = document.getElementById('loginForm');
            const errorMsg = document.getElementById('loginError');

            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const emailInput = document.getElementById('email').value.trim();
                const passInput = document.getElementById('password').value;

                try {
                    const users = JSON.parse(localStorage.getItem('omk_admin_users')) || [];
                    const validUser = users.find(u => u.email === emailInput && u.password === passInput);

                    if (validUser) {
                        localStorage.setItem('omk_admin_current', validUser.email);
                        window.location.href = 'admin.html';
                    } else {
                        errorMsg.style.display = 'block';
                    }
                } catch (err) {
                    console.error('Error reading users', err);
                    errorMsg.style.display = 'block';
                }
            });
        });
    </script>
</body>

</html>
